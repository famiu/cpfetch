language: en-US
early_access: false

reviews:
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  path_filters:
    - "!**/*.lock"
    - "!.venv/**"
    - "!dist/**"
    - "!build/**"
    - "!.ruff_cache/**"
    - "!__pycache__/**"
    - "!tests/fixtures/**"
    - "**"
  abort_on_close: true
  auto_review:
    enabled: true
    ignore_title_keywords: []
    labels: []
    drafts: false
    base_branches: []

chat:
  auto_reply: true
